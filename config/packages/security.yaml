security:
    # Selecciono l'encriptació en hashing automàtic (sol ser bcrypt o argon2i per sota l'estàndard symfony)
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # Defineixo com carrego i verifico des de la BDD d'on són els integrants de l'app de forma fiable
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # La paret o "Tallafocs" del sistema
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            # Apunto l'autenticador customitzat creat que jo he desenvolupat prèviament per gestionar exactament el submit Form POST.
            custom_authenticator: App\Security\LoginFormAuthenticator
            # Configuro a quina ruta salta en fer fora sessió, i que automàticament vagi al llistat de productes general
            logout:
                path: app_logout
                target: app_home
            # Configuro de retenir cookies per iniciar de nou posteriorment l'autenticació si tenen el botó remmber-me validat (Dura una setmana 604800s).
            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800
                path: /

    # Note: Only the *first* matching rule is applied
    access_control:
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
